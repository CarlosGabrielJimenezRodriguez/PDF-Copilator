<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroDoc Scanner - QC Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #34495e;
            --accent-color: #27ae60;
            --action-color: #2980b9;
            --bg-color: #f5f6fa;
            --text-color: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .header {
            background-color: var(--primary-color);
            color: white;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .control-panel {
            background: white;
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 2rem;
        }

        .row-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .form-group {
            flex: 1;
            min-width: 200px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        select, input[type="text"] {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
            background-color: white;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: opacity 0.3s;
            min-width: 150px;
        }

        .btn:hover { opacity: 0.9; }
        .btn:disabled { background-color: #bdc3c7; cursor: not-allowed; }

        .btn-primary { background-color: var(--accent-color); color: white; }
        .btn-secondary { background-color: var(--secondary-color); color: white; display: inline-block; }
        .btn-action { background-color: var(--action-color); color: white; }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .image-card {
            position: relative;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            aspect-ratio: 1;
        }

        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .remove-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(231, 76, 60, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Pantalla de Carga */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .hidden { display: none !important; }

        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--accent-color);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Modal de Previsualización */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            padding: 1rem;
        }

        .modal-content {
            flex: 1;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 1rem;
            background: var(--primary-color);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 { margin: 0; font-size: 1.2rem; }
        
        .close-modal {
            background: none; border: none; color: white;
            font-size: 1.5rem; cursor: pointer;
        }

        .pdf-viewer {
            flex: 1;
            width: 100%;
            border: none;
            background: #e0e0e0;
        }

        .modal-footer {
            padding: 1rem;
            background: #f1f1f1;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

    </style>
</head>
<body>
    <header class="header">
        <h1>Generador de Reportes PDF</h1>
        <p>Herramienta de captura y optimización de evidencias</p>
    </header>

    <main class="container">
        <section class="control-panel">
            
            <div class="row-group">
                <div class="form-group" style="flex: 100%;">
                    <label for="fileNameInput">Nombre del Documento:</label>
                    <input type="text" id="fileNameInput" placeholder="Ej. Reporte_Motor_V2500" value="Reporte_Escaneado">
                </div>

                <div class="form-group">
                    <label for="formatSelect">Tamaño de Hoja:</label>
                    <select id="formatSelect">
                        <option value="letter" selected>Carta (Letter)</option>
                        <option value="legal">Oficio (Legal)</option>
                        <option value="a4">A4 (Estándar)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="qualitySelect">Calidad de Envío:</label>
                    <select id="qualitySelect">
                        <option value="low">Bajo (Económico / Rápido)</option>
                        <option value="medium" selected>Medio (Estándar)</option>
                        <option value="high">Alto (Nítido / Pesado)</option>
                    </select>
                </div>
            </div>

            <div class="action-buttons">
                <label for="fileInput" class="btn btn-secondary">
                    📷 Seleccionar Fotografías
                </label>
                <input type="file" id="fileInput" accept="image/*" multiple hidden>
                
                <button id="previewBtn" class="btn btn-primary" disabled>
                    👁️ Generar y Ver PDF
                </button>
            </div>
        </section>

        <section class="preview-section">
            <h3>Evidencias Seleccionadas (<span id="imageCount">0</span>)</h3>
            <div id="previewGallery" class="gallery">
            </div>
        </section>
    </main>

    <div id="loadingOverlay" class="overlay hidden">
        <div class="spinner"></div>
        <p>Procesando documento...</p>
    </div>

    <div id="pdfModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Vista Previa del Documento</h2>
                <button class="close-modal" id="closeModalBtn">✖</button>
            </div>
            
            <iframe id="pdfIframe" class="pdf-viewer"></iframe>
            
            <div class="modal-footer">
                <button id="downloadBtn" class="btn btn-primary">⬇️ Descargar Archivo</button>
                <button id="shareBtn" class="btn btn-action">📱 Enviar / Compartir</button>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const previewGallery = document.getElementById('previewGallery');
        const previewBtn = document.getElementById('previewBtn');
        const qualitySelect = document.getElementById('qualitySelect');
        const formatSelect = document.getElementById('formatSelect');
        const fileNameInput = document.getElementById('fileNameInput');
        const imageCountLabel = document.getElementById('imageCount');
        const loadingOverlay = document.getElementById('loadingOverlay');
        
        // Elementos del Modal
        const pdfModal = document.getElementById('pdfModal');
        const pdfIframe = document.getElementById('pdfIframe');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const shareBtn = document.getElementById('shareBtn');

        let selectedImages = [];
        let currentPdfBlob = null; // Guardará el archivo PDF generado en memoria

        // 1. Manejo de archivos e imágenes (Igual que antes)
        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                if (file.type.startsWith('image/')) selectedImages.push(file);
            });
            updateGallery();
            fileInput.value = ''; 
        });

        function updateGallery() {
            previewGallery.innerHTML = '';
            imageCountLabel.textContent = selectedImages.length;
            previewBtn.disabled = selectedImages.length === 0;

            selectedImages.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const card = document.createElement('div');
                    card.className = 'image-card';
                    card.innerHTML = `
                        <img src="${e.target.result}" alt="Evidencia">
                        <button class="remove-btn" onclick="removeImage(${index})">X</button>
                    `;
                    previewGallery.appendChild(card);
                };
                reader.readAsDataURL(file);
            });
        }

        window.removeImage = function(index) {
            selectedImages.splice(index, 1);
            updateGallery();
        };

        // 2. Lógica para crear el PDF y abrir el Modal
        previewBtn.addEventListener('click', async () => {
            if (selectedImages.length === 0) return;
            loadingOverlay.classList.remove('hidden');
            
            try {
                const { jsPDF } = window.jspdf;
                const selectedFormat = formatSelect.value;
                const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: selectedFormat });
                
                let maxWidth, compressionQuality;
                switch (qualitySelect.value) {
                    case 'low':    maxWidth = 800; compressionQuality = 0.5; break;
                    case 'medium': maxWidth = 1200; compressionQuality = 0.7; break;
                    case 'high':   maxWidth = 1800; compressionQuality = 0.9; break;
                }

                for (let i = 0; i < selectedImages.length; i++) {
                    const optimizedBase64 = await compressImage(selectedImages[i], maxWidth, compressionQuality);
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = pdf.internal.pageSize.getHeight();

                    if (i > 0) pdf.addPage(selectedFormat, 'portrait');
                    pdf.addImage(optimizedBase64, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                }

                // En lugar de descargarlo directamente, lo guardamos en memoria (Blob)
                currentPdfBlob = pdf.output('blob');
                
                // Mostramos el PDF en el iframe
                const pdfUrl = URL.createObjectURL(currentPdfBlob);
                pdfIframe.src = pdfUrl;
                
                // Abrimos el modal
                pdfModal.classList.remove('hidden');

            } catch (error) {
                console.error("Error al generar:", error);
                alert("Error al crear el PDF. Intenta con menos imágenes o menor calidad.");
            } finally {
                loadingOverlay.classList.add('hidden');
            }
        });

        // Función Auxiliar de compresión
        function compressImage(file, maxWidth, quality) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = event => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height;
                        if (width > maxWidth) {
                            height = Math.round((height *= maxWidth / width));
                            width = maxWidth;
                        }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.onerror = reject;
                };
                reader.onerror = reject;
            });
        }

        // 3. Controles del Modal de Vista Previa

        // Cerrar el Modal
        closeModalBtn.addEventListener('click', () => {
            pdfModal.classList.add('hidden');
            pdfIframe.src = ''; // Limpiar memoria
        });

        // Obtener el nombre del archivo configurado por el usuario
        function getFileName() {
            let name = fileNameInput.value.trim();
            if (name === '') name = 'Reporte_Escaneado';
            // Validar que termine en .pdf
            return name.endsWith('.pdf') ? name : `${name}.pdf`;
        }

        // Botón Descargar (Local)
        downloadBtn.addEventListener('click', () => {
            if (!currentPdfBlob) return;
            const link = document.createElement('a');
            link.href = URL.createObjectURL(currentPdfBlob);
            link.download = getFileName();
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        // Botón Compartir (WhatsApp, Gmail, Outlook, etc.)
        shareBtn.addEventListener('click', async () => {
            if (!currentPdfBlob) return;

            const fileToShare = new File([currentPdfBlob], getFileName(), { type: 'application/pdf' });

            // Verificar si el navegador del celular soporta compartir archivos nativamente
            if (navigator.canShare && navigator.canShare({ files: [fileToShare] })) {
                try {
                    await navigator.share({
                        files: [fileToShare],
                        title: getFileName(),
                        text: 'Adjunto el documento escaneado generado.'
                    });
                } catch (error) {
                    console.log('El usuario canceló o falló el envío:', error);
                }
            } else {
                alert('Tu navegador actual no soporta el envío directo de archivos. Por favor, usa el botón de "Descargar" y envíalo manualmente.');
            }
        });

    </script>
</body>
</html>
